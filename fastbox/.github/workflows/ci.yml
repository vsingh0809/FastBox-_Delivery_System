name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest --cov=fastbox --cov-report=term-missing

      - name: Smoke-test CLI (base case)
        run: python main.py --input data/data.json --output /tmp/report.json

      - name: Smoke-test CLI (bonus + ASCII)
        run: python main.py --input data/data.json --bonus --delay-seed 42 --output /tmp/report_bonus.json
